services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  developer-agent:
    build:
      context: .
      dockerfile: developer_agent/Dockerfile
    env_file: .env
    volumes:
      - ./workspace:/workspace
      - ${HOME}/.ssh:/root/.ssh:ro
      # Share host Claude Max login with the agent container.
      - ${HOME}/.claude:/root/.claude
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  qa-agent:
    build:
      context: .
      dockerfile: qa_agent/Dockerfile
    env_file: .env
    volumes:
      - ./workspace:/workspace
      - ${HOME}/.ssh:/root/.ssh:ro
      - ${HOME}/.claude:/root/.claude
      - qa_artifacts:/tmp/qa_artifacts
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
  qa_artifacts:
