services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: bot/Dockerfile
    env_file: .env
    command: ["python", "-m", "bot.dashboard"]
    ports:
      - "8095:8095"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  developer-agent:
    build:
      context: .
      dockerfile: developer_agent/Dockerfile
    env_file: .env
    volumes:
      - ./workspace:/workspace
      - ${HOME}/.ssh:/root/.ssh:ro
      - ${HOME}/.claude:/root/.claude
      # Docker socket — lets the agent run `make deploy-dev`, `docker compose`, etc.
      - /var/run/docker.sock:/var/run/docker.sock
    # Host networking gives access to GPU containers and dev services on localhost.
    network_mode: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  code-reviewer:
    build:
      context: .
      dockerfile: code_reviewer/Dockerfile
    env_file: .env
    volumes:
      - ./workspace:/workspace
      - ${HOME}/.ssh:/root/.ssh:ro
      - ${HOME}/.claude:/root/.claude
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  ui-tester:
    build:
      context: .
      dockerfile: ui_tester/Dockerfile
    env_file: .env
    volumes:
      - ./workspace:/workspace
      - ${HOME}/.ssh:/root/.ssh:ro
      - ${HOME}/.claude:/root/.claude
      - ui_test_artifacts:/tmp/ui_test_artifacts
    # Host networking so Playwright can reach the dev site on localhost:7870.
    network_mode: host
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
  ui_test_artifacts:
